# Clean CSV -> Kronos batch prediction -> strict walk-forward backtest -> portfolio scan
# You can either put raw per-symbol CSV files in paths.raw_data_dir, or use the
# download command to fetch data with yfinance.

paths:
  raw_data_dir: data/raw_csv
  clean_data_dir: data/clean_csv
  predictions_dir: outputs/predictions
  backtest_dir: outputs/backtest
  scanner_dir: outputs/scanner

download:
  provider: yfinance
  period: 5y
  interval: 1d
  auto_adjust: true
  start: null
  end: null

prediction:
  # Built-in choices: kronos-mini, kronos-small, kronos-base
  model_key: kronos-small

  # Optional local fine-tuned model/tokenizer directories. Leave null to use Hugging Face models.
  model_path: null
  tokenizer_path: null
  max_context: 512

  lookback: 512
  pred_len: 5
  temperature: 1.0
  top_k: 0
  top_p: 0.9
  sample_count: 1
  device: null

walk_forward:
  lookback: 512
  pred_len: 5
  step: 5
  min_train_rows: 512
  initial_capital: 100000.0
  buy_threshold: 0.01
  sell_threshold: -0.01
  fee_rate: 0.0005
  slippage_rate: 0.0005
  max_position_pct: 1.0
  allow_short: false

scanner:
  min_predicted_return: 0.01
  min_win_rate: 0.50
  min_sharpe: 0.0
  max_drawdown_floor: -0.30
  min_trade_count: 5
  buy_score: 0.60
  watch_score: 0.35
  top_n: 20
